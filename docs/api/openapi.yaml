  /pos/vender:
    post:
      tags:
        - POS
      summary: Registrar venta desde el POS
      description: |
        'Permiso: pos.vender.'
        Si no se envía `cliente_id`, se busca o crea un cliente con `nombre_cliente`
        (o "Consumidor final" si tampoco se envía). Crea la factura completa:
        valida stock, descuenta inventario y registra en finanzas.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - forma_pago
                - productos
                - total
              properties:
                cliente_id:
                  type: integer
                  nullable: true
                nombre_cliente:
                  type: string
                  nullable: true
                  example: Consumidor final
                forma_pago:
                  type: string
                  example: efectivo
                total:
                  type: number
                  example: 33000
                productos:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/FacturaItemInput'
            example:
              nombre_cliente: Consumidor final
              forma_pago: efectivo
              total: 33000
              productos:
                - producto_id: 12
                  cantidad: 1
                  precio: 25000
                - producto_id: 3
                  cantidad: 2
                  precio: 4000
      responses:
        '201':
          description: Venta registrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 352
                  numero:
                    type: integer
                    example: 130
        '400':
          description: Datos incompletos o stock insuficiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-apidog-folder: POS
  /pos/borradores:
    get:
