      properties:
        id:
          type: integer
          example: 12
        nombre:
          type: string
          example: Hamburguesa clásica
        precio_unidad:
          type: number
          example: 25000
        codigo:
          type: string
          example: HAMB-01
        es_favorito:
          type: boolean
          example: true
        categoria_id:
          type: integer
          example: 3
        categoria_nombre:
          type: string
          example: Comidas
    Cliente:
      type: object
      properties:
        id:
          type: integer
          example: 15
        nombre:
          type: string
          example: Juan Pérez
        telefono:
          type: string
          nullable: true
          example: '3001234567'
        email:
          type: string
          nullable: true
          example: juan@example.com
        tipo_documento:
          type: string
          example: CC
        numero_documento:
          type: string
          nullable: true
          example: '1020304050'
        direccion:
          type: string
          nullable: true
    FacturaItemInput:
      type: object
      required:
        - producto_id
        - cantidad
        - precio
