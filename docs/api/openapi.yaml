                items:
                  type: array
                  minItems: 1
                  description: Items de la orden (estructura libre del carrito POS)
                  items:
                    type: object
                total:
                  type: number
                  example: 45000
                notas:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Borrador guardado
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 8
        '400':
          description: La orden no tiene productos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-apidog-folder: POS
  '/pos/borradores/{id}':
    delete:
      tags:
        - POS
      summary: Eliminar borrador
      parameters:
