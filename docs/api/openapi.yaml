          type: string
          example: Administrador
        rol:
          type: string
          example: admin
        tenant_id:
          type: integer
          example: 2
    Categoria:
      type: object
      properties:
        id:
          type: integer
          example: 3
        nombre:
          type: string
          example: Comidas
    Producto:
      type: object
      properties:
        id:
