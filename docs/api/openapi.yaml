  /api/dashboard/stats:
    get:
      tags:
        - Dashboard
      summary: Estadísticas del dashboard
      description: 'Rol requerido: admin. Respuesta cacheada por 2 minutos.'
      parameters:
        - name: desde
          in: query
          schema:
            type: string
            format: date
          description: Fecha inicial del rango (YYYY-MM-DD)
        - name: hasta
          in: query
          schema:
            type: string
            format: date
          description: Fecha final del rango (YYYY-MM-DD)
      responses:
        '200':
          description: KPIs del restaurante
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStats'
        '403':
          $ref: '#/components/responses/Forbidden'
      x-apidog-folder: Dashboard
  /api/dashboard/eventos-calendario:
    get:
      tags:
        - Dashboard
      summary: Eventos para el calendario del dashboard
      description: 'Rol requerido: admin'
      responses:
        '200':
          description: Eventos del tenant
          content:
            application/json:
              schema:
                type: object
                properties:
                  eventosCalendario:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        nombre:
                          type: string
                        fecha:
                          type: string
      x-apidog-folder: Dashboard
  /api/qr/pedidos:
    post:
      tags:
        - QR Público
      summary: Crear pedido desde el menú QR (cliente en mesa)
      description: |
        Endpoint público (sin token). 'Rate limit: máx. 3 pedidos cada 10 minutos por IP.'
        El `qr_token` identifica la mesa y el restaurante (viene en la URL del QR).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - qr_token
                - items
              properties:
                qr_token:
                  type: string
                  description: Token del QR de la mesa
                  example: a1b2c3d4e5f6
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - producto_id
                      - cantidad
                    properties:
                      producto_id:
                        type: integer
                        example: 12
                      cantidad:
                        type: number
                        example: 2
                notas:
                  type: string
                  nullable: true
                  example: Sin picante por favor
      responses:
        '200':
          description: Pedido procesado
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Pedido procesado correctamente.
                  data:
                    type: object
                    description: Datos del pedido creado
        '404':
          description: QR inválido o mesa no encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
        '429':
          description: Demasiados pedidos desde esta IP
      x-apidog-folder: QR Público
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token obtenido en POST /auth/login
  parameters:
    idPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
      example: 1
    mesaIdPath:
      name: mesaId
      in: path
      required: true
      schema:
        type: integer
      example: 5
    pedidoIdPath:
      name: pedidoId
      in: path
      required: true
      schema:
        type: integer
      example: 40
    itemIdPath:
      name: itemId
      in: path
      required: true
      schema:
        type: integer
      example: 101
  requestBodies:
    ProductoBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - codigo
              - nombre
              - precio_unidad
              - categoria_id
            properties:
              codigo:
                type: string
                maxLength: 50
                example: HAMB-01
              nombre:
                type: string
                maxLength: 100
                example: Hamburguesa clásica
              precio_unidad:
                type: number
                minimum: 0
                example: 25000
              categoria_id:
                type: integer
                example: 3
              descripcion:
                type: string
                maxLength: 1000
                nullable: true
                example: 'Carne 150g, queso, lechuga y tomate'
              imagen_url:
                type: string
                nullable: true
                example: 'https://r2.midominio.com/productos/hamb-01.jpg'
          example:
            codigo: HAMB-01
            nombre: Hamburguesa clásica
            precio_unidad: 25000
            categoria_id: 3
            descripcion: 'Carne 150g, queso, lechuga y tomate'
    ClienteBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - nombre
            properties:
              nombre:
                type: string
                maxLength: 255
                example: Juan Pérez
              telefono:
                type: string
                nullable: true
                example: '3001234567'
              email:
                type: string
                format: email
                nullable: true
                example: juan@example.com
              tipo_documento:
                type: string
                enum:
                  - CC
                  - NIT
                  - CE
                  - PA
                  - TI
                  - PEP
                default: CC
              numero_documento:
                type: string
                maxLength: 20
                nullable: true
                example: '1020304050'
          example:
            nombre: Juan Pérez
            telefono: '3001234567'
            email: juan@example.com
            tipo_documento: CC
            numero_documento: '1020304050'
  responses:
    Unauthorized:
      description: 'Token ausente, inválido o expirado'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: No autorizado. Token requerido
    Forbidden:
      description: 'Sin permiso, feature no incluida en el plan, o contexto de tenant no disponible'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: No tiene permisos para acceder a este recurso
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Recurso no encontrado
    ValidationError:
      description: Error de validación de datos
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: object
                  properties:
                    msg:
                      type: string
                      example: El nombre del producto es obligatorio
                    path:
                      type: string
                      example: nombre
                    location:
                      type: string
                      example: body
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: Mensaje de error
    Message:
      type: object
      properties:
        message:
          type: string
    SuccessMessage:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
    Usuario:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: admin
        nombre:
          type: string
          example: Administrador
        rol:
          type: string
          example: admin
        tenant_id:
          type: integer
          example: 2
    Categoria:
      type: object
      properties:
        id:
          type: integer
          example: 3
        nombre:
          type: string
          example: Comidas
    Producto:
      type: object
      properties:
        id:
          type: integer
          example: 12
        codigo:
          type: string
          example: HAMB-01
        nombre:
          type: string
          example: Hamburguesa clásica
        descripcion:
          type: string
          nullable: true
        precio_unidad:
          type: number
          example: 25000
        categoria_id:
          type: integer
          example: 3
        categoria_nombre:
          type: string
          example: Comidas
        imagen_url:
          type: string
          nullable: true
        es_favorito:
          type: boolean
          example: false
        activo:
          type: boolean
          example: true
    ProductoPOS:
      type: object
      description: Producto simplificado para la grilla del POS
      properties:
        id:
          type: integer
          example: 12
        nombre:
          type: string
          example: Hamburguesa clásica
        precio_unidad:
          type: number
          example: 25000
        codigo:
          type: string
          example: HAMB-01
        es_favorito:
          type: boolean
          example: true
        categoria_id:
          type: integer
          example: 3
        categoria_nombre:
          type: string
          example: Comidas
    Cliente:
      type: object
      properties:
        id:
          type: integer
          example: 15
        nombre:
          type: string
          example: Juan Pérez
        telefono:
          type: string
          nullable: true
          example: '3001234567'
        email:
          type: string
          nullable: true
          example: juan@example.com
        tipo_documento:
          type: string
          example: CC
        numero_documento:
          type: string
          nullable: true
          example: '1020304050'
        direccion:
          type: string
          nullable: true
    FacturaItemInput:
      type: object
      required:
        - producto_id
        - cantidad
        - precio
      properties:
        producto_id:
          type: integer
          description: ID de producto. IDs >= 1000000 son insumos virtuales (id_insumo + 1000000).
          example: 12
        cantidad:
          type: number
          example: 2
        precio:
          type: number
          description: Precio unitario
          example: 25000
        nombre:
          type: string
          nullable: true
        es_servicio:
          type: boolean
          default: false
    FacturaDetalles:
      type: object
      description: 'Respuesta de GET /api/facturas/{id}/detalles'
      properties:
        factura:
          type: object
          properties:
            id:
              type: integer
              example: 350
            numero:
              type: integer
              description: Consecutivo por tenant
              example: 128
            fecha:
              type: string
              example: '2026-07-06 19:32:10'
            fechaISO:
              type: string
