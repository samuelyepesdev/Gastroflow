        nombre:
          type: string
          example: Hamburguesa clásica
        descripcion:
          type: string
          nullable: true
        precio_unidad:
          type: number
          example: 25000
        categoria_id:
          type: integer
          example: 3
        categoria_nombre:
          type: string
          example: Comidas
        imagen_url:
          type: string
          nullable: true
        es_favorito:
          type: boolean
          example: false
        activo:
          type: boolean
          example: true
    ProductoPOS:
      type: object
