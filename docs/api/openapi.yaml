openapi: 3.0.3
info:
  title: GastroFlow API
  description: |
    API REST del sistema de gestión de restaurantes **GastroFlow** (multi-tenant).

    ## Autenticación
    La API usa **JWT (Bearer token)**. Obtén el token con `POST /auth/login` y envíalo en cada
    petición protegida con el header `Authorization: Bearer <token>`.
    (El sistema también acepta el token vía cookie `auth_token` — usado por la web — pero para
    integraciones externas usa siempre el header.)

    ## Multi-tenancy
    El tenant (restaurante) se resuelve automáticamente a partir del usuario autenticado.
    Todos los recursos (productos, clientes, facturas, mesas...) pertenecen al tenant del token.

    ## Permisos y plan
    Cada endpoint exige permisos específicos (se indican en la descripción como `Permiso: x.y`)
    y que el plan del tenant incluya la feature del módulo. Respuestas `403` indican falta de
    permiso, feature no incluida en el plan, o contexto de tenant no disponible.

    ## Convenciones
    - IDs de producto `>= 1000000` son **insumos virtuales**: `producto_id = id_insumo + 1000000`.
    - Los errores siempre tienen la forma `{ "error": "mensaje" }`.
    - Fechas en formato `YYYY-MM-DD HH:mm:ss` (hora del servidor) salvo que se indique ISO.

    ## Alcance de este documento
    Cubre los endpoints JSON de los módulos del tenant: Auth, Productos, Clientes, Facturas,
    Mesas/Pedidos, Cocina, POS, Dashboard, Inventario, Recetas, Proveedores, Caja, Eventos,
    Finanzas, Analítica, WhatsApp, Servicios, Soporte, Perfil, Notificaciones (SSE) y Menú QR
    público. Las rutas que renderizan vistas HTML (páginas EJS) no se documentan aquí.
    Pendientes: módulo **Costeo** (en rediseño) y panel **SuperAdmin** (`/admin/*`, se documentará
    en una spec aparte).
  version: 1.3.0
  contact:
    name: GastroFlow
servers:
  - url: 'http://localhost:3000'
    description: Desarrollo local (Laragon)
  - url: 'https://TU-DOMINIO-PRODUCCION'
    description: Producción
tags:
  - name: Auth
    description: Autenticación y sesión
  - name: Productos
    description: Catálogo de productos del restaurante
  - name: Clientes
    description: Clientes del restaurante
  - name: Facturas
    description: Facturación de ventas
  - name: Mesas
    description: 'Mesas, pedidos e items (ciclo de vida completo)'
  - name: Cocina
    description: Cola de cocina y estados de preparación
  - name: POS
    description: Terminal punto de venta
  - name: Dashboard
    description: Estadísticas del restaurante
  - name: Inventario
    description: Insumos, stock y movimientos de inventario
  - name: Recetas
    description: Recetas de productos (ingredientes y porciones)
  - name: Proveedores
    description: Proveedores y sus facturas adjuntas
  - name: Caja
    description: Turnos de caja (apertura, cierre y movimientos)
  - name: Eventos
    description: Eventos especiales del restaurante
  - name: Finanzas
    description: Dashboard financiero (ingresos, egresos, utilidad)
  - name: Analítica
    description: 'Analítica de ventas y predicción (solo rol admin)'
  - name: WhatsApp
    description: Conexión del bot de WhatsApp del tenant
  - name: Servicios
    description: Servicios internos y externos facturables
  - name: Ventas
    description: Exportación de ventas
  - name: Soporte
    description: Tickets de soporte del tenant
  - name: Perfil
    description: Perfil del restaurante (datos, logo, reportes)
  - name: Notificaciones
    description: Eventos en tiempo real vía Server-Sent Events
  - name: QR Público
    description: 'Pedidos desde el menú QR (sin autenticación, rate-limited)'
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: Iniciar sesión y obtener token JWT
      description: 'Rate limit: máx. 5 intentos por minuto por IP. El token devuelto también se setea como cookie `auth_token`.'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  format: password
                  example: MiClave123
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  token:
                    type: string
                    description: JWT para usar en el header Authorization
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6MSwicm9sIjoiYWRtaW4ifQ.abc123
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Credenciales incorrectas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Cuenta bloqueada o tenant inactivo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Demasiados intentos de login
      x-apidog-folder: Auth
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Cerrar sesión (limpia cookie)
      security: []
      responses:
        '200':
          description: Sesión cerrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
              example:
                success: true
                message: Sesión cerrada
      x-apidog-folder: Auth
  /auth/me:
    get:
      tags:
        - Auth
      summary: Perfil del usuario autenticado
      responses:
        '200':
          description: Datos del usuario
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/Usuario'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-apidog-folder: Auth
  /auth/cambiar-password:
    post:
      tags:
        - Auth
      summary: Cambiar contraseña del usuario autenticado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password_actual
                - password_nueva
              properties:
                password_actual:
                  type: string
                  format: password
                password_nueva:
                  type: string
                  format: password
                  minLength: 8
      responses:
        '200':
          description: Contraseña actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/ValidationError'
      x-apidog-folder: Auth
  /api/productos/buscar:
    get:
      tags:
        - Productos
      summary: Buscar productos
      description: 'Permiso: productos.ver'
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Texto de búsqueda (nombre o código)
          example: hamburguesa
      responses:
        '200':
          description: Lista de productos que coinciden
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Producto'
        '403':
          $ref: '#/components/responses/Forbidden'
      x-apidog-folder: Productos
  /api/productos/categorias:
    get:
      tags:
        - Productos
      summary: Listar categorías activas del tenant
      responses:
        '200':
          description: Categorías
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Categoria'
      x-apidog-folder: Productos
  '/api/productos/{id}':
    get:
      tags:
        - Productos
      summary: Obtener producto por ID
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '200':
          description: Producto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Producto'
        '404':
          $ref: '#/components/responses/NotFound'
      x-apidog-folder: Productos
    put:
      tags:
        - Productos
      summary: Actualizar producto
      description: 'Permiso: productos.editar'
      parameters:
        - $ref: '#/components/parameters/idPath'
      requestBody:
        $ref: '#/components/requestBodies/ProductoBody'
      responses:
        '200':
          description: Producto actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
              example:
                message: Producto actualizado exitosamente
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
      x-apidog-folder: Productos
    delete:
      tags:
        - Productos
      summary: Eliminar producto
      description: 'Permiso: productos.eliminar'
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '200':
          description: Producto eliminado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '404':
          $ref: '#/components/responses/NotFound'
      x-apidog-folder: Productos
  /api/productos:
    post:
      tags:
        - Productos
      summary: Crear producto
      description: 'Permiso: productos.crear. El código debe ser único dentro del tenant.'
      requestBody:
        $ref: '#/components/requestBodies/ProductoBody'
      responses:
        '201':
          description: Producto creado
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 42
                  message:
                    type: string
                    example: Producto creado exitosamente
        '400':
          description: Validación fallida o código duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Ya existe un producto con ese código
      x-apidog-folder: Productos
  '/api/productos/{id}/precio':
    put:
      tags:
        - Productos
      summary: Actualizar solo el precio
      description: 'Permiso: productos.editar. Usado para aplicar el precio sugerido desde costeo.'
      parameters:
        - $ref: '#/components/parameters/idPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - precio_unidad
              properties:
                precio_unidad:
                  type: number
                  example: 25000
      responses:
        '200':
          description: Precio actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
              example:
                message: Precio actualizado
        '400':
          description: precio_unidad es requerido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'
      x-apidog-folder: Productos
  '/api/productos/{id}/favorito':
    patch:
      tags:
        - Productos
      summary: Marcar/desmarcar producto como favorito
      description: 'Permiso: productos.editar. Los favoritos aparecen primero en la grilla del POS.'
      parameters:
        - $ref: '#/components/parameters/idPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - es_favorito
              properties:
                es_favorito:
                  type: boolean
                  example: true
      responses:
        '200':
          description: Estado de favorito actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
              example:
                message: Estado de favorito actualizado
      x-apidog-folder: Productos
  /api/productos/importar:
    post:
      tags:
        - Productos
      summary: Importar productos desde Excel
      description: |
        'Permisos: plantillas.ver + feature plantillas del plan.'
        El Excel debe tener una hoja "Productos" con columnas: codigo, nombre, categoria, precio_unidad.
        Si un código ya existe, el producto se actualiza. Archivo máx. 5 MB.
        Descarga la plantilla en GET /productos/plantilla.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - archivo
              properties:
                archivo:
                  type: string
                  format: binary
                  description: Archivo .xlsx con la hoja "Productos"
      responses:
        '200':
          description: Resumen de la importación (creados/actualizados por fila)
          content:
            application/json:
              schema:
                type: object
                description: Resultado de ProductService.importFromExcel
        '400':
          description: Archivo faltante o sin hoja "Productos"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-apidog-folder: Productos
  /api/productos/upload-image:
    post:
      tags:
        - Productos
      summary: Subir imagen de producto (Cloudflare R2)
      description: 'Permiso: productos.crear. Imagen máx. 5 MB. Devuelve la URL pública para usar en imagen_url.'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - imagen
              properties:
                imagen:
                  type: string
                  format: binary
      responses:
        '200':
          description: Imagen subida
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    example: 'https://r2.midominio.com/productos/hamburguesa-abc123.jpg'
        '400':
          description: No se recibió archivo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-apidog-folder: Productos
  /api/productos/plantilla:
    get:
      tags:
        - Productos
      summary: Descargar plantilla Excel para importación de productos
      description: Devuelve un archivo .xlsx con el formato esperado por POST /api/productos/importar.
      responses:
        '200':
          description: Archivo Excel (plantilla_productos.xlsx)
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
      x-apidog-folder: Productos
  /api/clientes/buscar:
    get:
      tags:
        - Clientes
      summary: Buscar clientes
      description: 'Permiso: clientes.ver'
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: 'Texto de búsqueda (nombre, teléfono o documento)'
          example: juan
      responses:
        '200':
          description: Clientes que coinciden
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cliente'
      x-apidog-folder: Clientes
  /api/clientes:
    post:
      tags:
        - Clientes
      summary: Crear cliente
      description: 'Permiso: clientes.crear'
      requestBody:
        $ref: '#/components/requestBodies/ClienteBody'
      responses:
        '201':
          description: Cliente creado
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 15
                  message:
                    type: string
                    example: Cliente creado exitosamente
        '400':
          $ref: '#/components/responses/ValidationError'
      x-apidog-folder: Clientes
  '/api/clientes/{id}':
    get:
      tags:
        - Clientes
      summary: Obtener cliente por ID
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '200':
          description: Cliente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'
        '404':
          $ref: '#/components/responses/NotFound'
      x-apidog-folder: Clientes
    put:
      tags:
        - Clientes
      summary: Actualizar cliente
      description: 'Permiso: clientes.editar'
      parameters:
        - $ref: '#/components/parameters/idPath'
      requestBody:
        $ref: '#/components/requestBodies/ClienteBody'
      responses:
        '200':
          description: Cliente actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
              example:
                message: Cliente actualizado exitosamente
        '404':
          $ref: '#/components/responses/NotFound'
      x-apidog-folder: Clientes
    delete:
      tags:
        - Clientes
      summary: Eliminar cliente
      description: 'Permiso: clientes.eliminar. Falla si el cliente tiene facturas asociadas.'
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '200':
          description: Cliente eliminado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
              example:
                message: Cliente eliminado exitosamente
        '400':
          description: El cliente tiene facturas asociadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: No se puede eliminar el cliente porque tiene facturas asociadas
        '404':
          $ref: '#/components/responses/NotFound'
      x-apidog-folder: Clientes
  /api/facturas:
    post:
      tags:
        - Facturas
      summary: Crear factura
      description: |
        Crea la factura con sus detalles. Valida stock de productos con receta,
        descuenta inventario, registra el ingreso en finanzas y la vincula a la
        sesión de caja abierta si existe. 'Permiso: facturas.crear'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cliente_id
                - total
                - forma_pago
                - productos
              properties:
                cliente_id:
                  type: integer
                  example: 1
                total:
                  type: number
                  example: 58000
                forma_pago:
                  type: string
                  example: efectivo
                evento_id:
                  type: integer
                  nullable: true
                  description: ID del evento si la venta pertenece a uno
                productos:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/FacturaItemInput'
            example:
              cliente_id: 1
              total: 58000
              forma_pago: efectivo
              productos:
                - producto_id: 12
                  cantidad: 2
                  precio: 25000
                - producto_id: 7
                  cantidad: 1
                  precio: 8000
      responses:
        '201':
          description: Factura creada
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: ID interno de la factura
                    example: 350
                  numero:
                    type: integer
                    description: Consecutivo por tenant (Factura N°)
                    example: 128
        '400':
          description: Datos incompletos o stock insuficiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: 'No hay stock suficiente para realizar esta venta. Carne de res: requiere 300 g, disponible 150 g'
      x-apidog-folder: Facturas
  '/api/facturas/{id}/detalles':
    get:
      tags:
        - Facturas
      summary: Detalles de una factura
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '200':
          description: Factura con cliente y líneas de detalle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacturaDetalles'
        '404':
          $ref: '#/components/responses/NotFound'
      x-apidog-folder: Facturas
  /api/mesas/listar:
    get:
      tags:
        - Mesas
      summary: Listar mesas con su estado actual
      description: 'Permiso: mesas.ver. Devuelve mesas físicas y virtuales ocupadas, ordenadas por número.'
      responses:
        '200':
          description: Mesas del tenant
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mesa'
      x-apidog-folder: Mesas/Gestión de Mesas
  /api/mesas/crear:
    post:
      tags:
        - Mesas
      summary: Crear mesa
      description: 'Permiso: mesas.gestionar'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MesaInput'
      responses:
        '201':
          description: Mesa creada
        '400':
          $ref: '#/components/responses/ValidationError'
      x-apidog-folder: Mesas/Gestión de Mesas
  /api/mesas/crear-masivas:
    post:
      tags:
        - Mesas
      summary: Crear mesas en lote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cantidad:
                  type: integer
                  example: 10
      responses:
        '201':
          description: Mesas creadas
      x-apidog-folder: Mesas/Gestión de Mesas
  '/api/mesas/{mesaId}':
    put:
      tags:
        - Mesas
      summary: Actualizar mesa
      description: 'Permiso: mesas.editar'
      parameters:
        - $ref: '#/components/parameters/mesaIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MesaInput'
      responses:
        '200':
          description: Mesa actualizada
        '400':
          $ref: '#/components/responses/ValidationError'
      x-apidog-folder: Mesas/Gestión de Mesas
    delete:
      tags:
        - Mesas
      summary: Eliminar mesa definitivamente
      description: 'Permiso: mesas.eliminar'
      parameters:
        - $ref: '#/components/parameters/mesaIdPath'
      responses:
        '200':
          description: Mesa eliminada
      x-apidog-folder: Mesas/Gestión de Mesas
  '/api/mesas/{mesaId}/liberar':
    put:
      tags:
        - Mesas
      summary: Liberar mesa (cerrar ocupación)
      parameters:
        - $ref: '#/components/parameters/mesaIdPath'
      responses:
        '200':
          description: Mesa liberada
      x-apidog-folder: Mesas/Acciones
  /api/mesas/abrir:
    post:
      tags:
        - Mesas
      summary: Abrir pedido en una mesa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mesa_id
              properties:
                mesa_id:
                  type: integer
                  example: 5
                cliente_id:
                  type: integer
                  nullable: true
                notas:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Pedido abierto
          content:
            application/json:
              schema:
                type: object
                properties:
                  pedido:
                    $ref: '#/components/schemas/Pedido'
        '404':
          description: Mesa no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-apidog-folder: Mesas/Pedidos
  '/api/mesas/pedidos/{pedidoId}':
    get:
      tags:
        - Mesas
      summary: Ver pedido con sus items
      parameters:
        - $ref: '#/components/parameters/pedidoIdPath'
      responses:
        '200':
          description: Pedido completo
          content:
            application/json:
              schema:
                type: object
                properties:
                  pedido:
                    $ref: '#/components/schemas/Pedido'
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PedidoItem'
        '404':
          $ref: '#/components/responses/NotFound'
      x-apidog-folder: Mesas/Pedidos
  '/api/mesas/pedidos/{pedidoId}/propina':
    patch:
      tags:
        - Mesas
      summary: Actualizar propina del pedido
      parameters:
        - $ref: '#/components/parameters/pedidoIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - propina
              properties:
                propina:
                  type: number
                  example: 5000
      responses:
        '200':
          description: Propina actualizada
        '404':
          $ref: '#/components/responses/NotFound'
      x-apidog-folder: Mesas/Pedidos
  '/api/mesas/pedidos/{pedidoId}/cliente':
    put:
      tags:
        - Mesas
      summary: Asignar/cambiar cliente del pedido
      parameters:
