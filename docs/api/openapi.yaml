          description: Servicios activos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Servicio'
      x-apidog-folder: Servicios
  '/api/servicios/{id}/update':
    post:
      tags:
        - Servicios
      summary: Actualizar servicio
      description: 'Permiso: servicios.editar. Enviar header `Accept: application/json` para respuesta JSON.'
      parameters:
        - $ref: '#/components/parameters/idPath'
      requestBody:
        $ref: '#/components/requestBodies/ServicioBody'
      responses:
        '200':
          description: Servicio actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '404':
          $ref: '#/components/responses/NotFound'
      x-apidog-folder: Servicios
  '/api/servicios/{id}/delete':
    post:
      tags:
        - Servicios
      summary: Eliminar servicio
      description: 'Permiso: servicios.eliminar. Enviar header `Accept: application/json` para respuesta JSON.'
      parameters:
        - $ref: '#/components/parameters/idPath'
      responses:
        '200':
          description: Servicio eliminado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
      x-apidog-folder: Servicios
  /ventas/export:
    get:
      tags:
        - Ventas
      summary: Exportar ventas a Excel
      description: 'Permiso: plantillas.ver. Features de plan: ventas y plantillas. Mismos filtros que la vista de ventas.'
      parameters:
        - name: desde
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: hasta
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Búsqueda por cliente o número de factura
        - name: evento_id
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Archivo Excel con las ventas filtradas
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
      x-apidog-folder: Ventas
  /soporte/enviar:
    post:
      tags:
        - Soporte
      summary: Enviar ticket de soporte
      description: Guarda el ticket y notifica por email al equipo de soporte.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tipo
                - descripcion
              properties:
                tipo:
                  type: string
                  enum:
                    - bug
                    - mejora
                    - duda
                    - urgente
                descripcion:
                  type: string
                  minLength: 10
                  maxLength: 2000
      responses:
        '200':
          description: Ticket enviado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/ValidationError'
      x-apidog-folder: Soporte
  /perfil/actualizar:
    post:
      tags:
        - Perfil
      summary: Actualizar perfil del restaurante (datos y logo)
      description: 'Permiso: perfil.editar. Logo: imagen máx. 2 MB.'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                direccion:
                  type: string
                telefono:
                  type: string
                email:
                  type: string
                  format: email
                colores:
                  type: string
                  description: JSON serializado con la paleta de colores del tenant
                  example: '{"primario":"#c0392b","secundario":"#2c3e50"}'
                logo:
                  type: string
                  format: binary
      responses:
        '200':
          description: Perfil actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '500':
          description: Error al actualizar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
      x-apidog-folder: Perfil
  /perfil/test-report:
    post:
      tags:
        - Perfil
      summary: Generar y enviar reporte mensual (prueba)
      description: 'Permiso: perfil.editar. Envía el reporte por email (y WhatsApp si el bot está conectado) y devuelve el PDF en base64.'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                mes:
                  type: integer
                  minimum: 1
                  maximum: 12
                  description: Mes del reporte (sin mes/anio usa el mes actual)
                anio:
                  type: integer
                  example: 2026
      responses:
        '200':
          description: Reporte generado y enviado
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  whatsapp:
                    type: boolean
                    description: true si también se envió por WhatsApp
                  pdfBase64:
                    type: string
                    nullable: true
                  fileName:
                    type: string
                    example: Reporte_7_2026.pdf
      x-apidog-folder: Perfil
  /api/notifications/subscribe:
    get:
      tags:
        - Notificaciones
      summary: Suscribirse a notificaciones en tiempo real (SSE)
      description: |
        Conexión **Server-Sent Events** (`Content-Type: text/event-stream`). Al conectar emite
        `{"event":"connected","tenantId":N}` y luego un evento `data:` por cada pedido creado
        (`{"event":"orderCreated", ...}`), filtrado por el tenant del token. Envía keep-alive
        cada 30 segundos. La conexión permanece abierta hasta que el cliente la cierre.
      responses:
        '200':
          description: Stream de eventos SSE
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  data: {"event":"connected","tenantId":2}
        '400':
          description: Tenant no disponible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-apidog-folder: Notificaciones
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token obtenido en POST /auth/login
  parameters:
    idPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
      example: 1
    mesaIdPath:
      name: mesaId
      in: path
      required: true
      schema:
        type: integer
      example: 5
    pedidoIdPath:
      name: pedidoId
      in: path
      required: true
      schema:
        type: integer
      example: 40
    itemIdPath:
      name: itemId
      in: path
      required: true
      schema:
        type: integer
      example: 101
  requestBodies:
    ProductoBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - codigo
              - nombre
              - precio_unidad
              - categoria_id
            properties:
              codigo:
                type: string
                maxLength: 50
                example: HAMB-01
              nombre:
                type: string
                maxLength: 100
                example: Hamburguesa clásica
              precio_unidad:
                type: number
                minimum: 0
                example: 25000
              categoria_id:
                type: integer
                example: 3
              descripcion:
                type: string
                maxLength: 1000
                nullable: true
                example: 'Carne 150g, queso, lechuga y tomate'
              imagen_url:
                type: string
                nullable: true
                example: 'https://r2.midominio.com/productos/hamb-01.jpg'
          example:
            codigo: HAMB-01
            nombre: Hamburguesa clásica
            precio_unidad: 25000
            categoria_id: 3
            descripcion: 'Carne 150g, queso, lechuga y tomate'
    ClienteBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - nombre
            properties:
              nombre:
                type: string
                maxLength: 255
                example: Juan Pérez
              telefono:
                type: string
                nullable: true
                example: '3001234567'
              email:
                type: string
                format: email
                nullable: true
                example: juan@example.com
              tipo_documento:
                type: string
                enum:
                  - CC
                  - NIT
                  - CE
                  - PA
                  - TI
                  - PEP
                default: CC
              numero_documento:
                type: string
                maxLength: 20
                nullable: true
                example: '1020304050'
          example:
            nombre: Juan Pérez
            telefono: '3001234567'
            email: juan@example.com
            tipo_documento: CC
            numero_documento: '1020304050'
    InsumoBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - codigo
              - nombre
            properties:
              codigo:
                type: string
                maxLength: 50
                example: INS-POLLO
              nombre:
                type: string
                maxLength: 100
                example: Pechuga de pollo
              unidad_compra:
                type: string
                maxLength: 20
                default: UND
                example: Kilo
              cantidad_compra:
                type: number
                minimum: 0.0001
                default: 1
                description: Cantidad (en unidad base) que trae cada unidad de compra
                example: 1000
              precio_compra:
                type: number
                minimum: 0
                example: 18000
              precio_venta:
                type: number
                minimum: 0
                nullable: true
              unidad_base:
                type: string
                default: g
                example: g
              stock_minimo:
                type: number
                minimum: 0
                example: 2000
              categoria_id:
                type: integer
                nullable: true
              unidad_medida_id:
                type: integer
                nullable: true
              proveedor_id:
                type: integer
                nullable: true
              stock_inicial:
                type: number
                nullable: true
                description: 'Solo en creación: si es > 0 registra una entrada inicial automática'
          example:
            codigo: INS-POLLO
            nombre: Pechuga de pollo
            unidad_compra: Kilo
            cantidad_compra: 1000
            precio_compra: 18000
            unidad_base: g
            stock_minimo: 2000
            stock_inicial: 5000
    RecetaBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - producto_id
              - nombre_receta
            properties:
              producto_id:
                type: integer
                example: 12
              nombre_receta:
                type: string
                example: Hamburguesa clásica x1
              porciones:
                type: number
                default: 1
                example: 1
              costos_adicionales:
                type: number
                nullable: true
                example: 500
              ingredientes:
                type: array
                items:
                  type: object
                  properties:
                    insumo_id:
                      type: integer
                    cantidad:
                      type: number
                      description: Cantidad por receta (en la unidad indicada)
                    unidad:
                      type: string
                      example: g
          example:
            producto_id: 12
            nombre_receta: Hamburguesa clásica x1
            porciones: 1
            ingredientes:
              - insumo_id: 7
                cantidad: 150
                unidad: g
    ProveedorBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - nombre
            properties:
              nombre:
                type: string
                example: Distribuidora El Campo
              nit:
                type: string
                nullable: true
                example: '900123456-7'
              contacto:
                type: string
                nullable: true
                example: Carlos Gómez
              telefono:
                type: string
                nullable: true
                example: '3009876543'
              email:
                type: string
                format: email
                nullable: true
              direccion:
                type: string
                nullable: true
              activo:
                type: integer
                enum:
                  - 0
                  - 1
                description: Solo en actualización (default 1)
    EventoBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - nombre
              - fecha_inicio
              - fecha_fin
            properties:
              nombre:
                type: string
                maxLength: 100
                example: Feria gastronómica
              descripcion:
                type: string
                maxLength: 500
                nullable: true
              fecha_inicio:
                type: string
                format: date
                example: '2026-07-10'
              fecha_fin:
                type: string
                format: date
                example: '2026-07-12'
              presupuesto:
                type: number
                minimum: 0
                nullable: true
                example: 500000
    ServicioBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - nombre
              - precio
            properties:
              nombre:
                type: string
                maxLength: 100
                example: Domicilio
              descripcion:
                type: string
                maxLength: 500
                nullable: true
              precio:
                type: number
                minimum: 0
                example: 5000
              es_externo:
                type: boolean
                default: false
                description: true si el cobro se transfiere a un tercero (no cuenta como venta propia)
              activo:
                type: boolean
                default: true
  responses:
    Unauthorized:
      description: 'Token ausente, inválido o expirado'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: No autorizado. Token requerido
    Forbidden:
      description: 'Sin permiso, feature no incluida en el plan, o contexto de tenant no disponible'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: No tiene permisos para acceder a este recurso
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Recurso no encontrado
    ValidationError:
      description: Error de validación de datos
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: object
                  properties:
                    msg:
                      type: string
                      example: El nombre del producto es obligatorio
                    path:
                      type: string
                      example: nombre
                    location:
                      type: string
                      example: body
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: Mensaje de error
    Message:
      type: object
      properties:
        message:
          type: string
    SuccessMessage:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
    Ok:
      type: object
      properties:
        ok:
          type: boolean
          example: true
    Insumo:
      type: object
      properties:
        id:
          type: integer
          example: 7
        codigo:
          type: string
          example: INS-POLLO
        nombre:
          type: string
          example: Pechuga de pollo
        unidad_compra:
          type: string
          example: Kilo
        cantidad_compra:
          type: number
          description: Cantidad en unidad base por cada unidad de compra
          example: 1000
        precio_compra:
          type: number
          example: 18000
        precio_venta:
          type: number
          nullable: true
        unidad_base:
          type: string
          example: g
        stock_actual:
          type: number
          example: 4500
        stock_minimo:
          type: number
          example: 2000
        costo_promedio:
          type: number
          description: Costo promedio por unidad base
          example: 18
        categoria_id:
          type: integer
          nullable: true
        proveedor_id:
          type: integer
          nullable: true
    MovimientoInventario:
      type: object
      properties:
        id:
          type: integer
        insumo_id:
          type: integer
          example: 7
        insumo_codigo:
          type: string
          example: INS-POLLO
        insumo_nombre:
          type: string
          example: Pechuga de pollo
        tipo:
          type: string
          enum:
            - entrada
            - salida
            - ajuste
        cantidad:
          type: number
          example: 5000
        costo_unitario:
          type: number
          nullable: true
        referencia:
          type: string
          nullable: true
          example: Compra factura 00123
        unidad_base:
          type: string
          example: g
        proveedor_nombre:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    Receta:
      type: object
      nullable: true
      properties:
        id:
          type: integer
          example: 3
        producto_id:
          type: integer
          example: 12
        nombre_receta:
          type: string
          example: Hamburguesa clásica x1
        porciones:
          type: number
          example: 1
        costos_adicionales:
          type: number
          nullable: true
        ingredientes:
          type: array
          items:
            type: object
            properties:
              insumo_id:
                type: integer
              insumo_nombre:
                type: string
              cantidad:
                type: number
              unidad:
                type: string
                example: g
    Proveedor:
      type: object
      properties:
        id:
          type: integer
          example: 4
        nombre:
          type: string
          example: Distribuidora El Campo
        nit:
          type: string
          nullable: true
          example: '900123456-7'
        contacto:
          type: string
          nullable: true
        telefono:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        direccion:
          type: string
          nullable: true
        activo:
          type: integer
          example: 1
    Servicio:
      type: object
      properties:
        id:
          type: integer
          example: 2
        nombre:
          type: string
          example: Domicilio
        descripcion:
          type: string
          nullable: true
        precio:
          type: number
          example: 5000
        es_externo:
          type: boolean
          example: false
        activo:
          type: boolean
          example: true
    Usuario:
      type: object
