      properties:
        factura:
          type: object
          properties:
            id:
              type: integer
              example: 350
            numero:
              type: integer
              description: Consecutivo por tenant
              example: 128
            fecha:
              type: string
              example: '2026-07-06 19:32:10'
            fechaISO:
              type: string
              format: date-time
              example: '2026-07-06T19:32:10.000Z'
            total:
              type: number
              example: 58000
            forma_pago:
              type: string
              example: efectivo
            propina:
              type: number
              example: 5000
        cliente:
          type: object
          properties:
            nombre:
              type: string
              example: Juan Pérez
            direccion:
              type: string
              example: 'Calle 10 # 5-23'
            telefono:
              type: string
              example: '3001234567'
        productos:
          type: array
          items:
            type: object
            properties:
              nombre:
                type: string
                example: Hamburguesa clásica
              cantidad:
                type: number
                example: 2
              precio_unitario:
                type: number
                example: 25000
              unidad_medida:
                type: string
                example: UND
              subtotal:
                type: number
                example: 50000
              es_servicio:
                type: boolean
                example: false
    Mesa:
      type: object
      properties:
        id:
          type: integer
          example: 5
        tenant_id:
          type: integer
        numero:
          type: string
          example: '5'
        descripcion:
          type: string
          nullable: true
          example: Terraza
        capacidad:
          type: integer
          nullable: true
          example: 4
        estado:
          type: string
          description: Estado actual de la mesa
          example: libre
        tipo:
          type: string
          enum:
            - fisica
            - virtual
          example: fisica
        pedidos_abiertos:
          type: integer
          description: Número de pedidos abiertos en la mesa
          example: 0
    MesaInput:
      type: object
      required:
        - numero
      properties:
        numero:
          type: string
          maxLength: 10
          example: '5'
        descripcion:
          type: string
          maxLength: 100
          nullable: true
          example: Terraza
        capacidad:
          type: integer
          minimum: 1
          nullable: true
          example: 4
    Pedido:
      type: object
      properties:
        id:
          type: integer
          example: 40
        numero:
          type: integer
          nullable: true
        mesa_id:
          type: integer
          example: 5
        cliente_id:
          type: integer
          nullable: true
        cliente_nombre:
          type: string
          nullable: true
        estado:
          type: string
          example: abierto
        propina:
          type: number
          example: 0
        notas:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    PedidoItem:
      type: object
      properties:
        id:
          type: integer
          example: 101
        pedido_id:
          type: integer
          example: 40
        producto_id:
          type: integer
